<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="dollar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="30%" stop-color="#FFEB3B"/>
      <stop offset="60%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>

  
  <!-- Pulse/EKG — bottom-left region -->
  <polyline points="10,88 38,88 50,48 62,118 74,88 80,88"
        fill="none" stroke="url(#pulse-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Dollar sign — upper-right region -->
  <text x="88" y="68" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="bold"
        fill="url(#dollar-grad)" text-anchor="middle">$</text>
</svg>
