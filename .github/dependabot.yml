version: 2
updates:
  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Pin @types/node to the major matching VS Code's bundled Node (24).
      # Bumping past it would type against APIs absent at runtime.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
